# ---------------------------------------------------------------------------
# HVV Störungen — configuration.yaml snippet
# Merge these sections into your existing /config/configuration.yaml
# ---------------------------------------------------------------------------

# Enable pyscript (install via HACS first — see INSTALL.md)
# allow_all_imports lets the script use stdlib modules (urllib, re, os, …)
pyscript:
  allow_all_imports: true

# No shell_command or automation needed — the script schedules itself
# via @time_trigger("cron(*/5 * * * *)") and exposes itself as a service
# via @service for manual calls from Developer Tools → Actions.

# ---------------------------------------------------------------------------
# Lovelace resource registration
# Either add below (yaml mode) or register via the UI:
#   Settings → Dashboards → Resources → Add resource
#   URL: /local/hvv-stoerungen-card.js  Type: JavaScript module
# ---------------------------------------------------------------------------

lovelace:
  resources:
    - url: /local/hvv-stoerungen-card.js
      type: module
